<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="ocean" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5f8a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <pattern id="reef" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#7bc8e8" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Ocean background -->
  <rect width="900" height="600" fill="url(#ocean)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#3a7ab8" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="450" x2="900" y2="450"/>
    <line x1="225" y1="0" x2="225" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="675" y1="0" x2="675" y2="600"/>
  </g>

  <!-- Shallow reef areas (impassable) -->
  <ellipse cx="450" cy="200" rx="180" ry="40" fill="url(#reef)" stroke="#7bc8e8" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <ellipse cx="450" cy="400" rx="200" ry="45" fill="url(#reef)" stroke="#7bc8e8" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Reef labels -->
  <text x="450" y="195" text-anchor="middle" fill="#a0d8ef" font-size="10" font-style="italic">shallow reefs</text>
  <text x="450" y="410" text-anchor="middle" fill="#a0d8ef" font-size="10" font-style="italic">shallow reefs</text>

  <!-- Shipping lanes (dashed) -->
  <path d="M 280,280 Q 400,260 520,280" fill="none" stroke="#ffdd57" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
  <path d="M 280,320 Q 400,340 520,320" fill="none" stroke="#ffdd57" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>

  <!-- Lane labels -->
  <text x="400" y="250" text-anchor="middle" fill="#ffdd57" font-size="9" font-style="italic">North Channel</text>
  <text x="400" y="360" text-anchor="middle" fill="#ffdd57" font-size="9" font-style="italic">South Channel</text>

  <!-- TAUMA - Western island chain -->
  <g filter="url(#shadow)">
    <!-- Main Tauma island -->
    <path d="M 120,250 Q 130,230 155,225 Q 175,220 185,235 Q 195,255 188,275 Q 180,295 160,300 Q 135,305 125,285 Q 115,270 120,250Z" fill="#6db86b" stroke="#4a8a48" stroke-width="1.5"/>
    <!-- Smaller Tauma islands -->
    <ellipse cx="140" cy="210" rx="18" ry="12" fill="#6db86b" stroke="#4a8a48" stroke-width="1"/>
    <ellipse cx="100" cy="290" rx="15" ry="10" fill="#78c476" stroke="#4a8a48" stroke-width="1"/>
    <ellipse cx="170" cy="330" rx="20" ry="11" fill="#78c476" stroke="#4a8a48" stroke-width="1"/>
    <ellipse cx="110" cy="340" rx="12" ry="8" fill="#85cc83" stroke="#4a8a48" stroke-width="1"/>
    <ellipse cx="195" cy="190" rx="10" ry="7" fill="#85cc83" stroke="#4a8a48" stroke-width="1"/>
  </g>

  <!-- Tauma label -->
  <text x="150" y="380" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" filter="url(#glow)">TAUMA</text>
  <text x="150" y="398" text-anchor="middle" fill="#b8e6b6" font-size="11">Naval Power</text>
  <!-- Tauma harbors -->
  <circle cx="185" cy="275" r="3" fill="#ffdd57" stroke="#fff" stroke-width="0.5"/>
  <circle cx="170" cy="330" r="3" fill="#ffdd57" stroke="#fff" stroke-width="0.5"/>

  <!-- NARU - Central small island -->
  <g filter="url(#shadow)">
    <path d="M 415,275 Q 425,260 445,258 Q 465,256 475,268 Q 485,282 480,298 Q 472,315 455,320 Q 435,322 422,310 Q 410,296 415,275Z" fill="#e8c96d" stroke="#c4a44e" stroke-width="1.5"/>
    <!-- Tiny rocky islets near Naru -->
    <ellipse cx="400" cy="260" rx="6" ry="4" fill="#d4b85c" stroke="#c4a44e" stroke-width="0.5"/>
    <ellipse cx="490" cy="305" rx="5" ry="3" fill="#d4b85c" stroke="#c4a44e" stroke-width="0.5"/>
  </g>

  <!-- Naru label -->
  <text x="448" y="300" text-anchor="middle" fill="#5a4520" font-size="16" font-weight="bold">NARU</text>
  <!-- Naru port -->
  <circle cx="425" cy="310" r="3" fill="#ffdd57" stroke="#fff" stroke-width="0.5"/>

  <!-- Naru Strait label (the channels on either side) -->
  <text x="448" y="235" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold" filter="url(#glow)">THE NARU STRAIT</text>
  <path d="M 380,240 L 410,240" fill="none" stroke="#fff" stroke-width="1" marker-end="none" opacity="0.5"/>
  <path d="M 488,240 L 518,240" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>

  <!-- VELDARA - Large eastern island -->
  <g filter="url(#shadow)">
    <path d="M 650,180 Q 680,160 720,155 Q 770,150 800,175 Q 830,200 835,250 Q 838,300 825,340 Q 810,380 780,410 Q 745,435 710,430 Q 675,425 655,400 Q 635,370 630,330 Q 625,290 630,250 Q 635,210 650,180Z" fill="#8b9e6b" stroke="#6b7d4e" stroke-width="1.5"/>
    <!-- Mountain ridges -->
    <path d="M 700,200 L 715,180 L 730,205" fill="none" stroke="#6b7d4e" stroke-width="1.5" opacity="0.6"/>
    <path d="M 730,220 L 748,195 L 762,225" fill="none" stroke="#6b7d4e" stroke-width="1.5" opacity="0.6"/>
    <path d="M 710,260 L 728,238 L 745,265" fill="none" stroke="#6b7d4e" stroke-width="1.5" opacity="0.6"/>
    <!-- Farmland patches -->
    <ellipse cx="720" cy="350" rx="35" ry="20" fill="#a3b87d" opacity="0.5"/>
    <ellipse cx="760" cy="390" rx="25" ry="15" fill="#a3b87d" opacity="0.5"/>
    <!-- Mining symbols -->
    <text x="735" y="230" text-anchor="middle" fill="#4a3d2a" font-size="10">&#9874;</text>
    <text x="755" y="260" text-anchor="middle" fill="#4a3d2a" font-size="10">&#9874;</text>
  </g>

  <!-- Veldara label -->
  <text x="730" y="470" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold" filter="url(#glow)">VELDARA</text>
  <text x="730" y="488" text-anchor="middle" fill="#c4d9a8" font-size="11">Resource Giant</text>
  <!-- Veldara port -->
  <circle cx="655" cy="330" r="3" fill="#ffdd57" stroke="#fff" stroke-width="0.5"/>

  <!-- REEF MARU - Disputed atoll (north) -->
  <g>
    <ellipse cx="430" cy="100" rx="22" ry="14" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,2"/>
    <ellipse cx="430" cy="100" rx="15" ry="8" fill="#d4b85c" opacity="0.6" stroke="#c4a44e" stroke-width="0.5"/>
    <text x="430" y="80" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">REEF MARU</text>
    <text x="430" y="125" text-anchor="middle" fill="#ff9999" font-size="9" font-style="italic">disputed - rare earth deposit</text>
    <!-- Dispute lines to each nation -->
    <line x1="430" y1="115" x2="200" y2="220" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="430" y1="115" x2="448" y2="258" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="430" y1="115" x2="700" y2="180" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  </g>

  <!-- Compass rose -->
  <g transform="translate(60,80)">
    <circle cx="0" cy="0" r="25" fill="rgba(0,0,0,0.3)" stroke="#ccc" stroke-width="0.5"/>
    <polygon points="0,-22 -4,-6 0,-10 4,-6" fill="#ff6b6b"/>
    <polygon points="0,22 -4,6 0,10 4,6" fill="#ccc"/>
    <polygon points="-22,0 -6,-4 -10,0 -6,4" fill="#ccc"/>
    <polygon points="22,0 6,-4 10,0 6,4" fill="#ccc"/>
    <text x="0" y="-28" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">N</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30,480)">
    <rect x="-10" y="-15" width="200" height="110" rx="6" fill="rgba(0,0,0,0.4)" stroke="#667" stroke-width="0.5"/>
    <text x="0" y="0" fill="#ffffff" font-size="11" font-weight="bold">Legend</text>
    <line x1="0" y1="18" x2="20" y2="18" stroke="#ffdd57" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="28" y="22" fill="#ddd" font-size="10">Shipping lanes</text>
    <circle cx="10" cy="38" r="3" fill="#ffdd57" stroke="#fff" stroke-width="0.5"/>
    <text x="28" y="42" fill="#ddd" font-size="10">Ports / harbors</text>
    <line x1="0" y1="58" x2="20" y2="58" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="28" y="62" fill="#ddd" font-size="10">Sovereignty claims</text>
    <rect x="2" y="72" width="16" height="8" fill="url(#reef)" stroke="#7bc8e8" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="28" y="80" fill="#ddd" font-size="10">Shallow reefs (impassable)</text>
  </g>

  <!-- Title -->
  <text x="450" y="560" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" letter-spacing="2" filter="url(#glow)">THE KALANI ARCHIPELAGO</text>
  <text x="450" y="580" text-anchor="middle" fill="#aaccdd" font-size="12" font-style="italic">~ not to scale ~</text>

  <!-- Direction labels -->
  <text x="50" y="300" text-anchor="middle" fill="#6699bb" font-size="11" transform="rotate(-90,50,300)">OPEN OCEAN</text>
  <text x="865" y="300" text-anchor="middle" fill="#6699bb" font-size="11" transform="rotate(90,865,300)">INNER SEA</text>
</svg>